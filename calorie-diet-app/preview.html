<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>极简热量管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:70px;color:#333;font-size:14px}
.header{background:linear-gradient(135deg,#4CAF50,#45a049);color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header-left .greeting{font-size:13px;opacity:0.9;margin-bottom:2px}
.header-left .name{font-size:18px;font-weight:700}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.2);padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;backdrop-filter:blur(4px)}
.streak-badge .fire{font-size:16px}
.tabs{display:flex;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.06);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:none;padding:12px 10px;text-align:center;cursor:pointer;font-size:12px;color:#888;border-bottom:2.5px solid transparent;white-space:nowrap}
.tab.active{color:#4CAF50;border-bottom-color:#4CAF50}
.page{display:none;padding:12px}
.page.active{display:block}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.card h3{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ring-container{width:110px;height:110px;position:relative;flex-shrink:0}
.ring-container svg{transform:rotate(-90deg)}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-center .cal{font-size:20px;font-weight:700;color:#333}
.ring-center .lbl{font-size:10px;color:#999}
.target-badge{display:inline-flex;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500}
.target-badge.fat{background:#FFF3E0;color:#FF9800}
.target-badge.keep{background:#E8F5E9;color:#4CAF50}
.target-badge.muscle{background:#E3F2FD;color:#2196F3}
.info-row{display:flex;gap:8px;margin-top:10px}
.info-chip{flex:1;background:#f8f9fa;border-radius:10px;padding:8px 6px;text-align:center}
.info-chip .val{font-size:13px;font-weight:600}
.info-chip .lbl{font-size:10px;color:#999;margin-top:2px}
.macro-row{display:flex;gap:8px;margin-top:10px}
.macro-bar{flex:1;border-radius:10px;padding:8px;text-align:center}
.macro-bar .val{font-size:14px;font-weight:700}
.macro-bar .pct{font-size:10px;color:#999;margin-top:2px}
.macro-bar .progress{height:4px;background:#e0e0e0;border-radius:2px;margin-top:4px;overflow:hidden}
.macro-bar .progress .fill{height:100%;border-radius:2px;transition:width 0.3s}
.meal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}
.meal-btn{display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:12px;border:1px solid #eee;background:#fff;cursor:pointer}
.meal-btn:active{transform:scale(0.95);border-color:#4CAF50}
.meal-btn .meal-icon{font-size:22px;margin-bottom:4px}
.meal-btn .meal-name{font-size:12px;color:#666}
.ai-banner{background:linear-gradient(135deg,#e3f2fd,#e8f5e9);border-radius:12px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;cursor:pointer;border:1px solid #c5cae9}
.ai-banner .ai-icon-wrap{width:42px;height:42px;border-radius:10px;background:#1677ff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ai-banner .ai-text .title{font-size:14px;font-weight:600;color:#1565c0}
.ai-banner .ai-text .desc{font-size:11px;color:#64b5f6;margin-top:2px}
.week-nav{display:flex;align-items:center;gap:2px;margin-bottom:8px}
.wn-btn{background:none;border:none;font-size:18px;color:#4CAF50;padding:4px 8px;cursor:pointer}
.wn-day{flex:1;text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;font-size:11px;color:#999}
.wn-day.active{background:#4CAF50;color:#fff}
.wn-day.today{background:#E8F5E9}
.wn-day .d-name{font-size:10px}
.wn-day .d-num{font-size:13px;font-weight:600}
.water-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:10px 0}
.water-dot{width:100%;aspect-ratio:1;border-radius:50%;border:2px solid #e0e0e0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.water-dot.filled{background:#2196f3;border-color:#2196f3;color:#fff}
.collapsible .col-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.collapsible .col-body{margin-top:8px;display:none}
.collapsible.open .col-body{display:block}
.food-item{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}
.food-item:last-child{border-bottom:none}
.food-item .fi-name{flex:1;font-size:13px}
.food-item .fi-cal{font-size:13px;font-weight:600}
.food-item .fi-add{width:24px;height:24px;border-radius:50%;background:#4CAF50;color:#fff;display:flex;align-items:center;justify-content:center;margin-left:8px;cursor:pointer;font-size:16px}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#4CAF50,#45a049);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn:active{opacity:0.9}
.btn-outline{background:#fff;border:1px solid #4CAF50;color:#4CAF50}
.btn-orange{background:linear-gradient(135deg,#FA8C16,#FFB74D);border-color:#FA8C16;color:#fff}
.input-group{margin-bottom:10px}
.input-group label{font-size:12px;color:#666;margin-bottom:4px;display:block}
.input-group input,.input-group select{width:100%;padding:8px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;display:none;text-align:center}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;display:none}
.modal-overlay.show{display:flex;align-items:flex-end}
.modal-sheet{width:100%;max-width:480px;margin:0 auto;background:#fff;border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto}
.modal-content-sm{width:90%;max-width:400px;margin:60px auto;background:#fff;border-radius:16px;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #eee}
.modal-header h3{font-size:15px}
.modal-close{background:none;border:none;font-size:20px;color:#999;cursor:pointer}
.modal-search{padding:10px 16px}
.modal-search input{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px}
.food-modal-body{display:flex;height:300px}
.food-categories{width:80px;background:#f8f9fa;overflow-y:auto;padding:8px 0;flex-shrink:0}
.food-cat{padding:12px 8px;font-size:12px;text-align:center;cursor:pointer;color:#666;border-left:3px solid transparent}
.food-cat.active{background:#fff;color:#1677FF;font-weight:600;border-left-color:#1677FF}
.food-list{flex:1;overflow-y:auto;padding:12px 16px}
.food-cat-title{font-size:15px;font-weight:600;color:#333;margin:0 0 8px;padding:4px 0 4px 4px;border-left:3px solid #4CAF50}
.food-cat-title span{font-size:12px;font-weight:400;color:#999}
.food-row{display:flex;align-items:center;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:6px;border:1px solid #f0f0f0;background:#fff}
.food-row.selected{background:#E6F4FF;border-color:#1677FF}
.food-row .fr-name{flex:1;font-size:14px;font-weight:500}
.food-row .fr-cal{font-size:12px;margin-right:8px}
.food-row .fr-check{width:24px;height:24px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.food-row.selected .fr-check{background:#1677FF;border-color:#1677FF;color:#fff}
.food-row .fr-portion{margin-top:6px;display:none;align-items:center;gap:8px}
.food-row.selected .fr-portion{display:flex}
.food-row .fr-portion input{width:100px;accent-color:#1677FF}
.food-row .fr-portion span{font-size:12px;color:#666}
.food-modal-footer{padding:12px 16px;border-top:1px solid #eee}
.selected-foods{font-size:12px;color:#666;margin-bottom:8px}
.confirm-btn{width:100%;padding:12px;border:none;border-radius:10px;background:#4CAF50;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.confirm-btn:disabled{background:#ccc}
.diet-filter{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.diet-filter::-webkit-scrollbar{display:none}
.diet-filter-btn{flex:none;padding:6px 14px;border-radius:16px;border:1px solid #eee;background:#fff;font-size:12px;cursor:pointer;white-space:nowrap}
.diet-filter-btn.active{background:#4CAF50;color:#fff;border-color:#4CAF50}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:#e0e0e0}
.timeline-item{position:relative;margin-bottom:16px}
.timeline-item::before{content:'';position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;background:#4CAF50;border:2px solid #fff;box-shadow:0 0 0 2px #4CAF50;z-index:1}
.timeline-item .tl-time{font-size:11px;color:#999;margin-bottom:4px}
.timeline-card{background:#fff;border-radius:10px;padding:10px;border:1px solid #eee}
.timeline-card .tc-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.timeline-card .tc-meal{font-size:13px;font-weight:600}
.timeline-card .tc-meal .check{color:#4CAF50}
.timeline-card .tc-cal{font-size:13px;font-weight:700;color:#4CAF50;margin-left:auto}
.timeline-card .tc-food{font-size:12px;color:#666;margin-bottom:6px}
.timeline-card .tc-macros{display:flex;gap:6px}
.timeline-card .tc-macro{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500}
.timeline-card .tc-macro.p{background:#e3f2fd;color:#1677ff}
.timeline-card .tc-macro.f{background:#fff7e6;color:#faad14}
.timeline-card .tc-macro.c{background:#e8f5e9;color:#52c41a}
.recipe-tabs{display:flex;gap:8px;margin-bottom:8px}
.recipe-tab{flex:1;text-align:center;padding:8px;border-radius:8px;background:#f8f9fa;font-size:13px;cursor:pointer}
.recipe-tab.active{background:#4CAF50;color:#fff}
.recipe-subtabs{display:flex;gap:6px;margin-bottom:12px}
.recipe-subtab{flex:1;padding:6px;border-radius:16px;border:1px solid #eee;background:#fff;font-size:11px;cursor:pointer;text-align:center}
.recipe-subtab.active{background:#E8F5E9;border-color:#4CAF50;color:#4CAF50}
.recipe-target-bar{display:flex;gap:12px;margin-bottom:12px;padding:10px;background:#fff;border-radius:10px}
.recipe-target-item{flex:1;text-align:center}
.recipe-target-item .rt-val{font-size:16px;font-weight:700}
.recipe-target-item .rt-lbl{font-size:10px;color:#999}
.recipe-card{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.04);cursor:pointer}
.recipe-card .rc-header{display:flex;justify-content:space-between;margin-bottom:6px}
.recipe-card .rc-name{font-size:14px;font-weight:600}
.recipe-card .rc-cal{font-size:13px;color:#4CAF50;font-weight:600}
.recipe-card .rc-desc{font-size:11px;color:#999;margin-bottom:8px}
.recipe-card .rc-tags{display:flex;gap:6px}
.recipe-card .rc-tag{padding:2px 8px;border-radius:4px;font-size:10px;background:#f0f0f0}
.recipe-card .rc-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.recipe-card .rc-cook{font-size:10px;color:#999}
.recipe-card .rc-add{background:#FA8C16;color:#fff;border:none;padding:4px 10px;border-radius:12px;font-size:11px;cursor:pointer}
.exercise-card{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,0.04);cursor:pointer}
.exercise-card .ex-icon{width:40px;height:40px;border-radius:10px;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:20px;margin-right:10px}
.exercise-card .ex-info{flex:1}
.exercise-card .ex-name{font-size:13px;font-weight:600}
.exercise-card .ex-meta{font-size:11px;color:#999;margin-top:2px}
.exercise-card .ex-cal{font-size:14px;font-weight:700;color:#4CAF50}
.exercise-cat-tabs{display:flex;gap:8px;margin-bottom:12px}
.exercise-cat-tab{flex:1;text-align:center;padding:8px;border-radius:8px;background:#f8f9fa;font-size:13px;cursor:pointer}
.exercise-cat-tab.active{background:#4CAF50;color:#fff}
.today-ex-list{margin-top:12px}
.today-ex-item{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#fff;border-radius:8px;margin-bottom:6px}
.today-ex-item .tei-name{font-size:13px;font-weight:600}
.today-ex-item .tei-meta{font-size:11px;color:#999}
.today-ex-item .tei-cal{font-size:13px;color:#4CAF50;font-weight:600}
.weight-overview{display:flex;gap:10px;margin-bottom:16px}
.weight-ov-item{flex:1;background:#fff;border-radius:10px;padding:12px;text-align:center}
.weight-ov-item .wo-val{font-size:20px;font-weight:700;color:#4CAF50}
.weight-ov-item .wo-lbl{font-size:10px;color:#999;margin-top:4px}
.weight-chart{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px}
.weight-chart h4{font-size:13px;font-weight:600;margin-bottom:10px}
.weight-list{background:#fff;border-radius:14px;padding:14px}
.weight-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.weight-item:last-child{border-bottom:none}
.weight-item .wi-val{font-size:14px;font-weight:600}
.weight-item .wi-date{font-size:11px;color:#999}
.weight-item .wi-change{font-size:12px;font-weight:500}
.weight-item .wi-change.up{color:#ff4757}
.weight-item .wi-change.down{color:#4CAF50}
.eval-score-card{background:linear-gradient(135deg,#4CAF50,#81C784);border-radius:16px;padding:30px;text-align:center;color:#fff;margin-bottom:16px}
.eval-score-card .es-val{font-size:48px;font-weight:700}
.eval-score-card .es-lbl{font-size:13px;opacity:0.9}
.eval-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.eval-item{background:#fff;border-radius:12px;padding:14px;text-align:center}
.eval-item .ei-val{font-size:20px;font-weight:700}
.eval-item .ei-lbl{font-size:11px;color:#999;margin-top:4px}
.eval-detail-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px}
.eval-detail-card .edc-title{font-size:13px;font-weight:600;margin-bottom:6px}
.eval-detail-card .edc-content{font-size:12px;color:#666;line-height:1.5}
.stat-chart{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px}
.stat-chart h4{font-size:13px;font-weight:600;margin-bottom:10px}
.stat-chart canvas{width:100%;height:180px}
.stat-mini{display:flex;gap:10px;margin-bottom:12px}
.stat-mini-item{flex:1;background:#fff;border-radius:10px;padding:12px;text-align:center}
.stat-mini-item .sm-val{font-size:18px;font-weight:700;color:#4CAF50}
.stat-mini-item .sm-lbl{font-size:10px;color:#999;margin-top:4px}
.profile-card{background:#fff;border-radius:14px;padding:20px;display:flex;align-items:center;gap:14px;margin-bottom:12px}
.profile-card .avatar{width:60px;height:60px;border-radius:50%;background:#E8F5E9;display:flex;align-items:center;justify-content:center;font-size:28px}
.profile-card .pc-name{font-size:16px;font-weight:700}
.profile-card .pc-meta{font-size:12px;color:#999;margin-top:2px}
.profile-card .pc-edit{margin-left:auto;width:32px;height:32px;border-radius:50%;background:#f8f9fa;border:none;cursor:pointer;font-size:16px}
.stat-overview{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat-ov-item{background:#fff;border-radius:10px;padding:14px;text-align:center}
.stat-ov-item .sov-val{font-size:18px;font-weight:700;color:#4CAF50}
.stat-ov-item .sov-lbl{font-size:10px;color:#999;margin-top:4px}
.checkin-card{background:linear-gradient(135deg,#FF9800,#FFB74D);border-radius:14px;padding:20px;color:#fff;display:flex;align-items:center;gap:14px;margin-bottom:12px}
.checkin-card .cc-icon{font-size:36px}
.checkin-card .cc-info{flex:1}
.checkin-card .cc-name{font-size:15px;font-weight:600}
.checkin-card .cc-desc{font-size:12px;opacity:0.9}
.checkin-card .cc-btn{background:rgba(255,255,255,0.3);border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:12px}
.quick-entries{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.quick-entry{background:#fff;border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.quick-entry .qe-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.quick-entry .qe-name{font-size:13px;font-weight:600}
.quick-entry .qe-desc{font-size:10px;color:#999}
.fixed-bottom{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#fff;padding:10px 16px;box-shadow:0 -2px 8px rgba(0,0,0,0.06);z-index:50}
.chart-bar{display:flex;align-items:flex-end;gap:6px;height:150px;padding:10px 0}
.chart-bar .bar{flex:1;background:linear-gradient(to top,#4CAF50,#81C784);border-radius:4px 4px 0 0;min-height:4px;position:relative}
.chart-bar .bar .bar-val{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;color:#666;white-space:nowrap}
.chart-bar .bar-label{text-align:center;font-size:10px;color:#999;margin-top:4px}
.recipe-page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.recipe-page-title{font-size:16px;font-weight:600}
.recipe-header-btns{display:flex;gap:8px}
.recipe-header-btn{background:#fff;border:1px solid #e0e0e0;padding:4px 10px;border-radius:12px;font-size:12px;cursor:pointer}
.recipe-header-btn.primary{background:#FA8C16;border-color:#FA8C16;color:#fff}
.recipe-search{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:24px;font-size:13px;margin-bottom:12px}
.ai-result-card{background:#F6FFED;border:1px solid #B7EB8F;border-radius:12px;padding:12px;margin-bottom:12px}
.ai-result-card .ai-rc-title{font-size:14px;font-weight:600;color:#389E0D;margin-bottom:8px}
.ai-result-card .ai-rc-text{font-size:12px;color:#389E0D;line-height:1.6;margin-bottom:8px}
.ai-result-card .ai-rc-tags{display:flex;gap:6px;flex-wrap:wrap}
.ai-result-card .ai-rc-tag{padding:2px 8px;border-radius:4px;font-size:10px;background:#E8F5E9;color:#4CAF50;cursor:pointer}
.meal-plan-date{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.meal-plan-date label{font-size:12px;color:#666}
.meal-plan-date input{padding:6px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px}
.plan-summary{background:#FFF7E6;border-radius:10px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-around;text-align:center}
.plan-summary .ps-item .ps-val{font-size:18px;font-weight:700}
.plan-summary .ps-item .ps-lbl{font-size:10px;color:#666;display:block}
.plan-recipe{display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid #f0f0f0;border-radius:8px;margin-bottom:6px}
.plan-recipe .pr-name{font-size:13px;font-weight:600}
.plan-recipe .pr-tags{display:flex;gap:4px;margin-top:4px}
.plan-recipe .pr-tag{padding:1px 6px;border-radius:4px;font-size:9px;background:#f0f0f0}
.plan-recipe .pr-info{flex:1}
.plan-recipe .pr-cal{font-size:11px;color:#999;margin-top:2px}
.plan-recipe .pr-remove{background:none;border:none;color:#ff4757;font-size:18px;cursor:pointer}
.calendar-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-nav-btn{background:none;border:none;font-size:14px;color:#FA8C16;padding:4px 8px;cursor:pointer}
.cal-month-title{font-size:15px;font-weight:600}

.cal-day.selected .cal-badge{color:#fff}
.day-plan-detail{margin-top:12px;padding-top:12px;border-top:1px solid #eee}
.day-plan-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.day-plan-title{font-size:13px;font-weight:600}
.day-plan-delete{background:none;border:none;color:#ff4757;font-size:12px;cursor:pointer}
.day-recipe{display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid #f0f0f0}
.day-recipe:last-child{border-bottom:none}
.day-recipe .dr-name{font-size:12px}
.day-recipe .dr-cal{font-size:11px;color:#4CAF50}
.day-plan-btn{width:100%;padding:8px;border:none;border-radius:8px;background:#4CAF50;color:#fff;font-size:12px;cursor:pointer;margin-top:8px}

function getTargetCal(){var t=profile.target||'fat';if(t==='fat')return 1300;if(t==='muscle')return 2000;return 1600;}
function calcBMR(){if(profile.gender==='male')return Math.round(10*profile.weight+6.25*profile.height-5*profile.age+5);return Math.round(10*profile.weight+6.25*profile.height-5*profile.age-161);}
function getWeekDates(){var today=new Date();var start=new Date(today);var dow=today.getDay()===0?6:today.getDay()-1;start.setDate(today.getDate()-dow-weekOffset*7);var dates=[];for(var i=0;i<7;i++){var d=new Date(start);d.setDate(start.getDate()+i);dates.push(d);}return dates;}
function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isToday(d){var today=new Date();return d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();}
function getDayName(d){var names=['日','一','二','三','四','五','六'];return '周'+names[d.getDay()];}
function getWeekRange(){var dates=getWeekDates();return formatDate(dates[0])+' ~ '+formatDate(dates[6]);}

function switchTab(page){
  document.querySelectorAll('#mainTabs .tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('#mainTabs .tab[data-page="'+page+'"]').forEach(function(t){t.classList.add('active');});

function addToMealPlan(id){var r=recipes.find(function(x){return x.id===id});if(!r)return;pendingAddRecipe=r;var today=new Date();var input=document.getElementById('dateSelectorInput');var min=new Date(today);min.setDate(min.getDate()-7);var max=new Date(today);max.setDate(max.getDate()+7);input.min=formatDate(min);input.max=formatDate(max);input.value=getTodayStr();document.getElementById('dateSelectorText').textContent='将 "'+r.name+'" 添加到哪天的餐单？';openModal('dateSelectorModal');}
function confirmAddToMealPlan(){if(!pendingAddRecipe)return;var dateStr=document.getElementById('dateSelectorInput').value;if(!dateStr){showToast('请选择日期');return;}var dayPlan=savedMealPlans.find(function(p){return p.date===dateStr});var existing=dayPlan?dayPlan.recipes:[];if(existing.find(function(r){return r.id===pendingAddRecipe.id})){showToast('该菜谱已在所选日期的餐单中');return;}var newRecipes=existing.concat([pendingAddRecipe]);savedMealPlans=savedMealPlans.filter(function(p){return p.date!==dateStr});savedMealPlans.push({date:dateStr,recipes:newRecipes});if(dateStr===selectedPlanDate)selectedPlanDate=dateStr;save();closeModal('dateSelectorModal');renderAll();showToast('已添加到 '+dateStr+' 的餐单');}

function loadMealPlanForDate(){var dateStr=document.getElementById('mealPlanDate').value;selectedPlanDate=dateStr;var dayPlan=savedMealPlans.find(function(p){return p.date===dateStr});var planRecipes=dayPlan?dayPlan.recipes:[];var html='';if(planRecipes.length===0){html='<div style="text-align:center;padding:40px 0;color:#999"><div style="font-size:40px;margin-bottom:8px">📋</div><p>餐单为空</p><p style="font-size:11px;margin-top:4px">浏览菜谱，点击"加入餐单"开始定制</p></div>';}else{var totalCal=planRecipes.reduce(function(s,r){return s+r.calorie},0);var totalP=planRecipes.reduce(function(s,r){return s+r.p},0);var totalF=planRecipes.reduce(function(s,r){return s+r.f},0);var totalC=planRecipes.reduce(function(s,r){return s+r.c},0);html+='<div class="plan-summary"><div class="ps-item"><div class="ps-val" style="color:#FA8C16">'+totalCal+'</div><div class="ps-lbl">千卡</div></div><div class="ps-item"><div class="ps-val" style="color:#1677FF">'+totalP+'g</div><div class="ps-lbl">蛋白质</div></div><div class="ps-item"><div class="ps-val" style="color:#FAAD14">'+totalF+'g</div><div class="ps-lbl">脂肪</div></div><div class="ps-item"><div class="ps-val" style="color:#52C41A">'+totalC+'g</div><div class="ps-lbl">碳水</div></div></div>';planRecipes.forEach(function(r){html+='<div class="plan-recipe"><div class="pr-info"><div class="pr-name">'+r.name+'</div><div class="pr-tags"><span class="pr-tag">'+(r.cat==='chinese'?'中餐':'轻食')+'</span><span class="pr-tag">'+r.meal+'</span></div><div class="pr-cal">'+r.calorie+'千卡 | 蛋白质'+r.p+'g 脂肪'+r.f+'g 碳水'+r.c+'g</div></div><button class="pr-remove" onclick="removeFromMealPlan(\''+r.id+'\')">&times;</button></div>';});}document.getElementById('mealPlanContent').innerHTML=html;}
function removeFromMealPlan(id){var dateStr=document.getElementById('mealPlanDate').value;var dayPlan=savedMealPlans.find(function(p){return p.date===dateStr});if(!dayPlan)return;dayPlan.recipes=dayPlan.recipes.filter(function(r){return r.id!==id});save();loadMealPlanForDate();showToast('已移除');}

function openCalendar(){calYear=new Date().getFullYear();calMonth=new Date().getMonth()+1;selectedCalDate=getTodayStr();generateCalendarDays();openModal('calendarModal');}
function closeCalendar(){closeModal('calendarModal');}
function generateCalendarDays(){
  var firstDay=new Date(calYear,calMonth-1,1);var lastDay=new Date(calYear,calMonth,0);var daysInMonth=lastDay.getDate();var startDay=firstDay.getDay();startDay=startDay===0?6:startDay-1;
  var today=getTodayStr();var days=[];
  for(var i=0;i<startDay;i++)days.push({date:'',day:'',isPadding:true});
  for(var d=1;d<=daysInMonth;d++){
    var dateStr=calYear+'-'+String(calMonth).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dayPlan=savedMealPlans.find(function(p){return p.date===dateStr});
    var hasPlan=dayPlan&&dayPlan.recipes&&dayPlan.recipes.length>0;
    var totalCal=hasPlan?dayPlan.recipes.reduce(function(s,r){return s+r.calorie},0):0;
    var count=hasPlan?dayPlan.recipes.length:0;
    days.push({date:dateStr,day:d,isPadding:false,isToday:dateStr===today,hasPlan:hasPlan,recipeCount:count,totalCal:totalCal});
  }
  document.getElementById('calMonthTitle').textContent=calYear+'年'+calMonth+'月';
  var html='';days.forEach(function(day){if(day.isPadding){html+='<div class="cal-day-cell"><div class="cal-day empty"></div></div>';}else{html+='<div class="cal-day-cell"><div class="cal-day '+(day.isToday?'today':'')+' '+(selectedCalDate===day.date?'selected':'')+' '+(day.hasPlan?'has-plan':'')+'" onclick="onCalDateTap(\''+day.date+'\')"><div class="cal-day-num">'+day.day+'</div>'+(day.hasPlan?'<div class="cal-badge">'+day.recipeCount+'道 '+day.totalCal+'千卡</div>':'')+'</div></div>';}});document.getElementById('calGrid').innerHTML=html;document.getElementById('calDayDetail').innerHTML='';}
function onCalDateTap(dateStr){if(!dateStr)return;selectedCalDate=dateStr;generateCalendarDays();var dayPlan=savedMealPlans.find(function(p){return p.date===dateStr});var html='';if(dayPlan&&dayPlan.recipes&&dayPlan.recipes.length>0){html+='<div class="day-plan-detail"><div class="day-plan-header"><span class="day-plan-title">'+dateStr+' 餐单</span><span class="day-plan-delete" onclick="deleteCalDayPlan()">删除</span></div>';dayPlan.recipes.forEach(function(r){html+='<div class="day-recipe"><span class="dr-name">'+r.name+'</span><span class="dr-cal">'+r.calorie+'千卡</span></div>';});html+='<button class="day-plan-btn" onclick="addCalDayToRecords()">添加到今日记录</button></div>';}else{html+='<div style="text-align:center;padding:20px;color:#999;font-size:12px">'+dateStr+' 暂无餐单</div>';}document.getElementById('calDayDetail').innerHTML=html;}
function calPrevMonth(){if(calMonth===1){calYear--;calMonth=12;}else{calMonth--;}generateCalendarDays();}
function calNextMonth(){if(calMonth===12){calYear++;calMonth=1;}else{calMonth++;}generateCalendarDays();}
function deleteCalDayPlan(){if(!selectedCalDate)return;savedMealPlans=savedMealPlans.filter(function(p){return p.date!==selectedCalDate});save();generateCalendarDays();document.getElementById('calDayDetail').innerHTML='';showToast('已删除');}
function addCalDayToRecords(){var dayPlan=savedMealPlans.find(function(p){return p.date===selectedCalDate});if(!dayPlan||!dayPlan.recipes)return;var now=new Date();var dateStr=getTodayStr();var timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');var mealMap={breakfast:'breakfast',lunch:'lunch',dinner:'dinner'};dayPlan.recipes.forEach(function(r){records.push({id:Date.now().toString(36)+Math.random().toString(36).substr(2,5),name:r.name,calorie:r.cal,weight:100,mealType:mealMap[r.meal]||'lunch',p:r.p,f:r.f,c:r.c,date:dateStr,time:timeStr,timestamp:Date.now()});});save();renderAll();showToast('已添加到今日记录');}

function openAddWeightModal(){document.getElementById('addWeightInput').value='';openModal('addWeightModal');}
function saveWeight(){var w=parseFloat(document.getElementById('addWeightInput').value);if(!w||w<30||w>200){showToast('请输入有效体重');return;}weightRecords.push({id:Date.now().toString(36)+Math.random().toString(36).substr(2,5),weight:w,date:getTodayStr(),time:new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}),timestamp:Date.now()});profile.weight=w;save();closeModal('addWeightModal');renderAll();showToast('体重记录成功');}

function drawWeightChart(){var canvas=document.getElementById('weightChartSVG');if(!canvas)return;var ctx=canvas.getContext('2d');var w=canvas.width;var h=canvas.height;ctx.clearRect(0,0,w,h);var data=weightRecords.slice(-30).sort(function(a,b){return a.timestamp-b.timestamp;});if(data.length<2){ctx.fillStyle='#999';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('至少需要2条记录',w/2,h/2);return;}var minW=Math.min.apply(null,data.map(function(d){return d.weight}))-2;var maxW=Math.max.apply(null,data.map(function(d){return d.weight}))+2;var targetW=profile.targetWeight||52;var padding={top:20,right:20,bottom:30,left:40};var cw=w-padding.left-padding.right;var ch=h-padding.top-padding.bottom;ctx.strokeStyle='#f0f0f0';ctx.lineWidth=1;for(var i=0;i<=4;i++){var y=padding.top+(ch/4)*i;ctx.beginPath();ctx.moveTo(padding.left,y);ctx.lineTo(w-padding.right,y);ctx.stroke();ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText((maxW-(maxW-minW)/4*i).toFixed(0),padding.left-6,y+3);}var targetY=padding.top+((maxW-targetW)/(maxW-minW))*ch;if(targetY>padding.top&&targetY<h-padding.bottom){ctx.strokeStyle='#52C41A';ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(padding.left,targetY);ctx.lineTo(w-padding.right,targetY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#52C41A';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText('目标',w-padding.right-20,targetY-4);}var points=data.map(function(d,i){return{x:padding.left+(i/(data.length-1))*cw,y:padding.top+((maxW-d.weight)/(maxW-minW))*ch};});ctx.strokeStyle='#1677FF';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();points.forEach(function(p,i){if(i===0)ctx.moveTo(p.x,p.y);else ctx.lineTo(p.x,p.y);});ctx.stroke();ctx.fillStyle='#1677FF';ctx.globalAlpha=0.3;ctx.beginPath();ctx.moveTo(points[0].x,h-padding.bottom);points.forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.lineTo(points[points.length-1].x,h-padding.bottom);ctx.fill();ctx.globalAlpha=1;points.forEach(function(p){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(p.x,p.y,4,0,2*Math.PI);ctx.fill();ctx.fillStyle='#1677FF';ctx.beginPath();ctx.arc(p.x,p.y,3,0,2*Math.PI);ctx.fill();});}

function drawCalorieChart(){var container=document.getElementById('calorieChart');if(!container)return;var goal=getTargetCal();var data=[];var today=new Date();for(var i=13;i>=0;i--){var d=new Date(today);d.setDate(d.getDate()-i);var ds=formatDate(d);var recs=records.filter(function(r){return r.date===ds});var cal=recs.reduce(function(s,r){return s+r.calorie},0);data.push({label:(d.getMonth()+1)+'/'+d.getDate(),cal:cal});}var maxC=Math.max.apply(null,data.map(function(d){return d.cal}).concat([goal]));maxC=Math.ceil(maxC/100)*100;var html='';data.forEach(function(d){var h=Math.round(d.cal/maxC*100);html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div class="bar" style="width:100%;height:'+Math.max(h,2)+'%;background:'+((d.cal>goal?'linear-gradient(to top,#ff4757,#ff6b81)':'linear-gradient(to top,#4CAF50,#81C784)'))+'"><span class="bar-val">'+(d.cal>0?d.cal:'')+'</span></div><div class="bar-label">'+d.label+'</div></div>';});container.innerHTML=html;}

function drawMacroChart(){var canvas=document.getElementById('macroChartCanvas');if(!canvas)return;var ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);var today=getTodayStr();var recs=records.filter(function(r){return r.date===today});var p=recs.reduce(function(s,r){return s+(r.p||0)},0);var f=recs.reduce(function(s,r){return s+(r.f||0)},0);var c=recs.reduce(function(s,r){return s+(r.c||0)},0);var total=p+f+c;if(total===0){ctx.fillStyle='#999';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('暂无数据',canvas.width/2,canvas.height/2);return;}var cx=canvas.width/2;var cy=canvas.height/2;var r=50;var items=[{name:'蛋白质',val:p,color:'#FF6B6B'},{name:'脂肪',val:f,color:'#FFD93D'},{name:'碳水',val:c,color:'#6BCB77'}];var startAngle=0;items.forEach(function(item){var angle=(item.val/total)*2*Math.PI;ctx.fillStyle=item.color;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,startAngle,startAngle+angle);ctx.fill();startAngle+=angle;});ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,30,0,2*Math.PI);ctx.fill();ctx.fillStyle='#333';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(total.toFixed(0)+'g',cx,cy+4);ctx.fillStyle='#666';ctx.font='10px sans-serif';var ly=canvas.height-10;var lx=20;items.forEach(function(item){ctx.fillStyle=item.color;ctx.fillRect(lx,ly-6,10,10);ctx.fillStyle='#666';ctx.textAlign='left';ctx.fillText(item.name+' '+(item.val/total*100).toFixed(0)+'%',lx+14,ly+2);lx+=80;});}

function calcAchievement(){var div=document.getElementById('achievementStats');if(!div)return;var goal=getTargetCal();var calOk=0,exOk=0,waterOk=0;var today=new Date();for(var i=0;i<14;i++){var d=new Date(today);d.setDate(d.getDate()-i);var ds=formatDate(d);var recs=records.filter(function(r){return r.date===ds});var cal=recs.reduce(function(s,r){return s+r.calorie},0);if(cal>0&&cal<=goal*1.1)calOk++;var ex=exRecords.filter(function(r){return r.date===ds});if(ex.length>0&&ex.reduce(function(s,r){return s+r.calorie},0)>100)exOk++;var wCount=recs.filter(function(r){return r.name==='饮水'}).length;if(wCount>=8)waterOk++;}div.innerHTML='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px"><div style="background:#fff;border-radius:10px;padding:12px;text-align:center"><div style="font-size:20px;font-weight:700;color:#4CAF50">'+Math.round(calOk/14*100)+'%</div><div style="font-size:10px;color:#999">热量达标</div></div><div style="background:#fff;border-radius:10px;padding:12px;text-align:center"><div style="font-size:20px;font-weight:700;color:#2196F3">'+Math.round(exOk/14*100)+'%</div><div style="font-size:10px;color:#999">运动达标</div></div><div style="background:#fff;border-radius:10px;padding:12px;text-align:center"><div style="font-size:20px;font-weight:700;color:#FF9800">'+Math.round(waterOk/14*100)+'%</div><div style="font-size:10px;color:#999">饮水达标</div></div></div>';}

function generateAiSuggestion(total,goal,p,f,c,tdee){if(total===0)return null;if(total>goal*1.2)return'今日摄入超标'+Math.round(total-goal)+'千卡，建议晚餐选择清淡食物，如蔬菜沙拉或清汤，避免高油高糖食物。';if(total<goal*0.6)return'今日摄入偏低，建议适当补充坚果、水果或牛奶，确保营养均衡。';if(p<20)return'蛋白质摄入偏低，建议补充鸡胸肉、鸡蛋或豆制品。';if(f>50)return'脂肪摄入偏高，建议下一餐减少油炸食品。';return'今日饮食均衡，建议继续保持。下一餐可搭配粗粮和新鲜蔬菜。';}

function addPlanRecipeToRecord(id){var today=getTodayStr();var dayPlan=savedMealPlans.find(function(p){return p.date===today});if(!dayPlan)return;var recipe=dayPlan.recipes.find(function(r){return r.id===id});if(!recipe)return;var now=new Date();var timeStr=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');records.push({id:Date.now().toString(36)+Math.random().toString(36).substr(2,5),name:recipe.name,calorie:recipe.cal,weight:100,mealType:recipe.meal,p:recipe.p,f:recipe.f,c:recipe.c,date:today,time:timeStr,timestamp:Date.now()});save();renderAll();showToast('已添加 '+recipe.name);}

function calcStreak(){var streak=0;var today=new Date();for(var i=0;i<365;i++){var d=new Date(today);d.setDate(d.getDate()-i);var ds=formatDate(d);var has=checkins.some(function(c){return c.date===ds;});if(has)streak++;else break;}return streak;}
function calcPoints(){return checkins.length*10;}
function doCheckIn(){var today=getTodayStr();var exists=checkins.some(function(c){return c.date===today;});if(exists){showToast('今天已打卡');return;}checkins.push({id:Date.now().toString(36)+Math.random().toString(36).substr(2,5),date:today,points:10,timestamp:Date.now()});save();renderAll();showToast('打卡成功 +10积分');}
function editProfile(){showToast('编辑功能开发中');}

init();
</script>
